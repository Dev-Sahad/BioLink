<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BioLink</title>
  <meta name="theme-color" content="#7c6aff"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── PUBLIC PAGE TOKENS ───── themes override these ── */
    :root{--btn-rad:50px;}
    [data-theme="light"]   {--bg:#f5f5ff;--surface:#fff;--card:#e8e8f5;--card-h:#ddddf0;--border:rgba(0,0,0,.08);--text:#0a0a1a;--muted:#6060a0;}
    [data-theme="cyber"]   {--bg:#030310;--surface:#080820;--card:#0e0e28;--card-h:#141432;--accent:#00ffe1;--accent2:#ff00c8;--glow:rgba(0,255,225,.18);}
    [data-theme="midnight"]{--bg:#000010;--surface:#080818;--card:#0c0c20;--card-h:#111128;}
    [data-theme="forest"]  {--bg:#071007;--surface:#0b160b;--card:#101d10;--card-h:#152315;}
    [data-theme="rose"]    {--bg:#120008;--surface:#1a000f;--card:#200014;--card-h:#280019;}
    [data-theme="vapor"]   {--bg:#0d0020;--surface:#160030;--card:#1c0040;--card-h:#240050;--accent:#ff71ce;--accent2:#05d9e8;}
    [data-theme="sand"]    {--bg:#f5f0e8;--surface:#fff;--card:#ede8df;--card-h:#e0dbd2;--text:#1a1612;--muted:#7a7060;--border:rgba(0,0,0,.1);}
    [data-btnstyle="rounded"]{--btn-rad:10px;}
    [data-btnstyle="sharp"]{--btn-rad:4px;}

    body{background:var(--bg);overflow-x:hidden;}
    .page{max-width:600px;margin:0 auto;padding:32px 18px 80px;position:relative;z-index:1;}

    /* ── TOPBAR ─── */
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
    .topbar-logo{font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-actions{display:flex;gap:6px;}
    .top-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:50px;padding:5px 12px;font-family:var(--ff);font-size:12px;cursor:pointer;text-decoration:none;transition:all .2s;}
    .top-btn:hover{color:var(--text);border-color:var(--accent);}

    /* ── SHARE BAR ─── */
    .share-bar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:9px 13px;margin-bottom:22px;}
    .share-url{flex:1;font-family:var(--ffm);font-size:12px;color:var(--accent);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .copy-btn{background:var(--accent-d);border:1px solid rgba(124,106,255,.3);color:var(--accent);border-radius:8px;padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .copy-btn:hover{background:var(--accent);color:#fff;}
    .copy-btn.ok{color:var(--success);border-color:rgba(61,255,160,.4);}

    /* ── PROFILE ─── */
    .profile{text-align:center;margin-bottom:26px;}
    .avatar-wrap{position:relative;display:inline-block;margin-bottom:14px;}
    .avatar{width:92px;height:92px;border-radius:50%;border:2.5px solid var(--accent);box-shadow:0 0 0 4px var(--glow),0 0 32px var(--glow);object-fit:cover;}
    .avatar-ring{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid rgba(124,106,255,.25);animation:spin 8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .status-dot{position:absolute;bottom:5px;right:5px;width:13px;height:13px;border-radius:50%;background:#3dff8f;border:2.5px solid var(--bg);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(61,255,143,.5)}50%{box-shadow:0 0 0 7px rgba(61,255,143,0)}}
    .username{font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px;}
    .pronouns{font-size:12px;color:var(--muted);margin-bottom:6px;font-family:var(--ffm);}
    .typewriter-wrap{font-size:13px;color:var(--muted);font-family:var(--ffm);min-height:18px;margin-bottom:10px;}
    .cursor{display:inline-block;width:2px;height:13px;background:var(--accent);margin-left:1px;animation:blink .75s step-end infinite;vertical-align:middle;}
    @keyframes blink{50%{opacity:0}}
    .bio-text{font-size:14px;color:var(--muted);max-width:380px;margin:0 auto 10px;line-height:1.6;}
    .location{font-size:12px;color:var(--muted);margin-bottom:10px;}
    .views-chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:3px 12px;font-size:12px;color:var(--muted);margin-bottom:12px;}

    /* ── USER BADGES ─── */
    .user-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:14px;}
    .user-badge{font-size:11px;font-weight:600;border-radius:50px;padding:3px 10px;background:var(--accent-d);border:1px solid rgba(124,106,255,.25);color:var(--accent);}

    /* ── SOCIALS ─── */
    .socials{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:22px;}
    .social-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:7px 15px;font-size:13px;font-weight:500;color:var(--text);text-decoration:none;transition:all .2s;}
    .social-btn:hover{border-color:var(--accent);transform:translateY(-1px);}

    /* ── SECTION LABEL ─── */
    .sec-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:26px 0 10px;padding-left:2px;}

    /* ── LINK CARDS ─── */
    .link-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:14px 15px;text-decoration:none;color:var(--text);transition:all .22s;position:relative;overflow:hidden;margin-bottom:9px;}
    .link-card::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,var(--accent),var(--accent2));opacity:0;transition:opacity .22s;}
    .link-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 28px var(--glow);}
    .link-card:hover::before{opacity:.05;}
    .link-card>*{position:relative;}
    .link-icon{width:40px;height:40px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .link-info{flex:1;min-width:0;}
    .link-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .link-desc{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .link-tag{font-size:10px;font-weight:600;border-radius:50px;padding:2px 8px;background:var(--accent-d);color:var(--accent);border:1px solid rgba(124,106,255,.25);flex-shrink:0;}
    .link-arrow{color:var(--muted);font-size:14px;flex-shrink:0;}

    /* ── MEDIA GRID / GALLERY ─── */
    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
    .gallery-card{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--border);cursor:pointer;position:relative;}
    .gallery-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
    .gallery-card:hover img{transform:scale(1.07);}
    .gallery-card .g-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:22px;}
    .gallery-card:hover .g-overlay{opacity:1;}

    /* ── MUSIC EMBED ─── */
    .music-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);overflow:hidden;margin-bottom:10px;}
    .music-card iframe{width:100%;border:none;display:block;}
    .music-label{font-size:11px;color:var(--muted);padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;}

    /* ── CUSTOM AUDIO PLAYER ─── */
    .audio-player{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:16px;display:flex;flex-direction:column;gap:12px;margin-bottom:10px;}
    .audio-title{font-size:14px;font-weight:600;}
    .audio-controls{display:flex;align-items:center;gap:10px;}
    .play-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
    .play-btn:hover{transform:scale(1.08);}
    .progress-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer;position:relative;}
    .progress-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .1s;}
    .time-display{font-family:var(--ffm);font-size:11px;color:var(--muted);flex-shrink:0;}
    .vol-wrap{display:flex;align-items:center;gap:6px;font-size:14px;}
    .vol-slider{width:70px;accent-color:var(--accent);}

    /* ── VIDEO EMBED ─── */
    .video-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);overflow:hidden;margin-bottom:10px;}
    .video-card iframe{width:100%;border:none;display:block;aspect-ratio:16/9;}
    .video-label{font-size:11px;color:var(--muted);padding:8px 14px;border-top:1px solid var(--border);}

    /* ── QR FAB ─── */
    .qr-fab{position:fixed;bottom:24px;right:20px;z-index:100;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px var(--glow);color:#fff;font-size:20px;transition:transform .2s;}
    .qr-fab:hover{transform:scale(1.1);}

    /* ── QR MODAL ─── */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-bg.open{opacity:1;pointer-events:all;}
    .modal-inner{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;text-align:center;max-width:300px;width:90%;transform:translateY(14px);transition:transform .22s;}
    .modal-bg.open .modal-inner{transform:translateY(0);}
    .modal-inner h3{margin-bottom:6px;}
    .modal-inner p{font-size:13px;color:var(--muted);margin-bottom:16px;}
    #qrc{display:block;margin:0 auto 16px;border-radius:8px;}
    .modal-close{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:50px;padding:7px 20px;font-family:var(--ff);font-size:13px;cursor:pointer;}

    /* ── LIGHTBOX ─── */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .lightbox.open{opacity:1;pointer-events:all;}
    .lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain;}
    .lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;}

    /* ── CREDIT FOOTER ─── */
    .credit-footer{text-align:center;margin-top:48px;padding:16px 0;border-top:1px solid var(--border);}
    .credit-footer a{font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s;}
    .credit-footer a:hover{color:var(--accent);}
    .credit-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--muted);}

    /* ── NOT FOUND ─── */
    .not-found{text-align:center;padding:80px 20px;}
    .not-found .nf-icon{font-size:56px;margin-bottom:16px;}
    .not-found h2{margin-bottom:8px;}
    .not-found p{font-size:14px;color:var(--muted);margin-bottom:24px;}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
  </style>
</head>
<body>

<!-- MOBILE STATUS BAR (device UI) -->
<div class="device-frame" id="device-frame">
  <div class="device-status">
    <span class="device-time" id="device-time">00:00</span>
    <span>📶 🔋</span>
  </div>
</div>

<canvas id="particles-canvas"></canvas>

<div class="page" id="page">
  <div class="not-found" id="loading">
    <div class="nf-icon">⏳</div><h2>Loading…</h2>
  </div>
</div>

<button class="qr-fab" id="qr-fab" style="display:none" title="QR Code">⬛</button>
<div class="modal-bg" id="qr-modal">
  <div class="modal-inner">
    <h3>Scan to Visit</h3>
    <p>Share without typing</p>
    <canvas id="qrc" width="180" height="180"></canvas>
    <br><button class="modal-close" id="qr-close">Close</button>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">✕</button>
  <img src="" id="lb-img" alt="Gallery"/>
</div>

<div id="toast"></div>

<script src="app.js"></script>
<script>
const params   = new URLSearchParams(location.search);
const username = (params.get('u')||'').toLowerCase().trim();
const page     = document.getElementById('page');

/* ── TOAST ── */
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.cssText='opacity:1;transform:translateX(-50%) translateY(0)';clearTimeout(el._t);el._t=setTimeout(()=>{el.style.cssText='opacity:0;transform:translateX(-50%) translateY(80px)';},2500);}

/* ── COPY ── */
function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{const o=btn.textContent;btn.textContent='✓ Copied!';btn.classList.add('ok');setTimeout(()=>{btn.textContent=o;btn.classList.remove('ok');},2000);toast('Copied to clipboard!');});}

/* ── SOCIAL URL MAP ── */
function socialUrl(key,val){
  const map={twitter:v=>`https://twitter.com/${v.replace('@','')}`,instagram:v=>`https://instagram.com/${v.replace('@','')}`,youtube:v=>v.startsWith('http')?v:`https://youtube.com/@${v}`,discord:v=>v.startsWith('http')?v:`https://discord.gg/${v}`,github:v=>`https://github.com/${v.replace('@','')}`,tiktok:v=>`https://tiktok.com/@${v.replace('@','')}`,linkedin:v=>v.startsWith('http')?v:`https://linkedin.com/in/${v}`,twitch:v=>`https://twitch.tv/${v}`,snapchat:v=>`https://snapchat.com/add/${v.replace('@','')}`,pinterest:v=>`https://pinterest.com/${v.replace('@','')}`,spotify:v=>v.startsWith('http')?v:`https://open.spotify.com/user/${v}`,reddit:v=>`https://reddit.com/u/${v.replace('u/','')}`,steam:v=>`https://steamcommunity.com/id/${v}`,paypal:v=>`https://paypal.me/${v}`,cashapp:v=>`https://cash.app/$${v.replace('$','')}`};
  const icons={twitter:'🐦',instagram:'📸',youtube:'▶️',discord:'💬',github:'💻',tiktok:'🎵',linkedin:'💼',twitch:'🎮',snapchat:'👻',pinterest:'📌',spotify:'🎧',reddit:'🤖',steam:'🎮',paypal:'💰',cashapp:'💵'};
  const labels={twitter:'Twitter',instagram:'Instagram',youtube:'YouTube',discord:'Discord',github:'GitHub',tiktok:'TikTok',linkedin:'LinkedIn',twitch:'Twitch',snapchat:'Snapchat',pinterest:'Pinterest',spotify:'Spotify',reddit:'Reddit',steam:'Steam',paypal:'PayPal',cashapp:'Cash App'};
  return{href:(map[key]||(v=>v))(val),icon:icons[key]||'🔗',label:labels[key]||key};
}

function guessEmoji(url){if(!url)return'🔗';const u=url.toLowerCase();if(u.includes('youtube')||u.includes('youtu.be'))return'▶️';if(u.includes('spotify'))return'🎵';if(u.includes('twitter')||u.includes('x.com'))return'🐦';if(u.includes('instagram'))return'📸';if(u.includes('github'))return'💻';if(u.includes('discord'))return'💬';if(u.includes('tiktok'))return'🎵';if(u.includes('twitch'))return'🎮';if(u.includes('shop')||u.includes('store')||u.includes('merch'))return'🛒';if(u.includes('patreon'))return'🎁';if(u.includes('ko-fi')||u.includes('buymeacoffee'))return'☕';return'🔗';}

/* ── YOUTUBE EMBED ── */
function ytEmbed(url){const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?#]+)/);return m?`https://www.youtube.com/embed/${m[1]}?rel=0`:null;}
function vimeoEmbed(url){const m=url.match(/vimeo\.com\/(\d+)/);return m?`https://player.vimeo.com/video/${m[1]}`:null;}

/* ── PARTICLES ── */
function initParticles(accent){
  const canvas=document.getElementById('particles-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let w,h,pts=[];
  const resize=()=>{w=canvas.width=innerWidth;h=canvas.height=innerHeight;};
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<55;i++) pts.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.5+.5,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,a:Math.random()});
  function draw(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.a+=.005;
      if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=accent+(Math.floor(Math.abs(Math.sin(p.a))*60+20).toString(16).padStart(2,'0'));
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

/* ── CURSOR TRAIL ── */
function initCursorTrail(){
  const trails=[];
  for(let i=0;i<12;i++){const d=document.createElement('div');d.className='cursor-trail';d.style.opacity=0;document.body.appendChild(d);trails.push({el:d,x:0,y:0});}
  let mx=0,my=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  let i=0;
  setInterval(()=>{if(trails.length){const t=trails[i%trails.length];t.x=mx;t.y=my;t.el.style.left=mx+'px';t.el.style.top=my+'px';t.el.style.opacity=.7;setTimeout(()=>t.el.style.opacity=0,400);i++;}},40);
}

/* ── SNOW ── */
function initSnow(){
  const flakes=['❄','❅','❆','✦','·'];
  for(let i=0;i<25;i++){
    const el=document.createElement('div');
    el.className='snowflake'; el.textContent=flakes[Math.floor(Math.random()*flakes.length)];
    el.style.cssText=`left:${Math.random()*100}vw;animation-duration:${Math.random()*6+4}s;animation-delay:${Math.random()*4}s;font-size:${Math.random()*12+8}px;opacity:${Math.random()*.5+.2}`;
    document.body.appendChild(el);
  }
}

/* ── QR DRAW ── */
function drawQR(canvas){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#7c6aff';ctx.lineWidth=3;ctx.strokeRect(4,4,W-8,H-8);
  const cell=9,pad=16,cols=Math.floor((W-pad*2)/cell),rows=Math.floor((H-pad*2)/cell);
  ctx.fillStyle='#0a0a0f';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if((c*13+r*7+(c^r))%3===0)ctx.fillRect(pad+c*cell,pad+r*cell,cell-1,cell-1);
  const sq=(x,y)=>{ctx.fillStyle='#0a0a0f';ctx.fillRect(x,y,21,21);ctx.fillStyle='#fff';ctx.fillRect(x+3,y+3,15,15);ctx.fillStyle='#7c6aff';ctx.fillRect(x+6,y+6,9,9);};
  sq(pad-2,pad-2);sq(W-pad-19,pad-2);sq(pad-2,H-pad-19);
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(W/2-28,H/2-10,56,20);
  ctx.fillStyle='#7c6aff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SCAN ME',W/2,H/2);
}

/* ── ESC HTML ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── MAIN RENDER ── */
function render(){
  if(!username){showNotFound('No username.','Add ?u=username to the URL.');return;}
  const bio=BL.getBio(username);
  if(!bio){showNotFound(`@${username} not found.`,'This BioLink doesn\'t exist yet.');return;}
  if(!bio.published){showNotFound(`@${username}`,'This page is set to private.');return;}

  // Apply theme
  document.documentElement.dataset.theme   =bio.theme||'dark';
  document.documentElement.dataset.btnstyle=bio.btnStyle||'pill';
  if(bio.accentColor){document.documentElement.style.setProperty('--accent',bio.accentColor);document.documentElement.style.setProperty('--glow',bio.accentColor+'33');}
  document.title=`${bio.displayName||username} | BioLink`;
  document.querySelector('meta[name="theme-color"]').content=bio.accentColor||'#7c6aff';

  // Effects
  if(bio.particlesEnabled!==false)initParticles(bio.accentColor||'#7c6aff');
  if(bio.cursorTrail)initCursorTrail();
  if(bio.snowEnabled) initSnow();

  // Track view
  BL.trackView(username);
  const views=BL.viewCount(username);
  const url=BL.bioUrl(username);
  const socials=bio.socials||{};
  const links=bio.links||[];
  const gallery=bio.gallery||[];
  const taglines=(bio.tagline||'').split('·').map(s=>s.trim()).filter(Boolean);
  const music=bio.music||{};
  const video=bio.video||{};

  /* build music section */
  let musicHTML='';
  if(music.type==='spotify'&&music.url){
    musicHTML=`<div class="sec-label">🎵 Now Playing</div>
    <div class="music-card"><iframe src="${esc(music.url)}" height="80" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>
    <div class="music-label">🎧 Listening on Spotify</div></div>`;
  } else if(music.type==='soundcloud'&&music.url){
    musicHTML=`<div class="sec-label">🎵 Music</div>
    <div class="music-card"><iframe src="https://w.soundcloud.com/player/?url=${encodeURIComponent(music.url)}&color=%237c6aff&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false" height="120" allow="autoplay"></iframe>
    <div class="music-label">☁️ SoundCloud</div></div>`;
  } else if(music.type==='custom'&&music.url){
    musicHTML=`<div class="sec-label">🎵 Music</div>
    <div class="audio-player" id="audio-player">
      <div class="audio-title">${esc(music.title||'Track')}</div>
      <div class="audio-controls">
        <button class="play-btn" id="play-btn">▶</button>
        <div class="progress-wrap" id="prog-wrap"><div class="progress-bar" id="prog-bar"></div></div>
        <span class="time-display" id="time-display">0:00</span>
        <div class="vol-wrap">🔊<input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step=".05" value="0.8"/></div>
      </div>
      <audio id="audio-el" src="${esc(music.url)}" preload="none"></audio>
    </div>`;
  }

  /* build video section */
  let videoHTML='';
  if(video.type==='youtube'&&video.url){
    const embed=ytEmbed(video.url);
    if(embed)videoHTML=`<div class="sec-label">📺 Video</div>
    <div class="video-card"><iframe src="${embed}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>
    <div class="video-label">▶️ ${esc(video.title||'Watch on YouTube')}</div></div>`;
  } else if(video.type==='vimeo'&&video.url){
    const embed=vimeoEmbed(video.url);
    if(embed)videoHTML=`<div class="sec-label">📺 Video</div>
    <div class="video-card"><iframe src="${embed}" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen loading="lazy"></iframe>
    <div class="video-label">🎬 ${esc(video.title||'Watch on Vimeo')}</div></div>`;
  } else if(video.type==='custom'&&video.url){
    videoHTML=`<div class="sec-label">📺 Video</div>
    <div class="video-card"><video controls style="width:100%;display:block;" preload="none"><source src="${esc(video.url)}"/></video>
    <div class="video-label">🎬 ${esc(video.title||'Video')}</div></div>`;
  }

  /* build gallery */
  let galleryHTML='';
  if(gallery.length){
    galleryHTML=`<div class="sec-label">📸 Gallery</div>
    <div class="gallery-grid">${gallery.map((src,i)=>`
      <div class="gallery-card" data-src="${esc(src)}" data-idx="${i}">
        <img src="${esc(src)}" alt="Photo ${i+1}" loading="lazy"/>
        <div class="g-overlay">🔍</div>
      </div>`).join('')}</div>`;
  }

  page.innerHTML=`
    <div class="topbar">
      <a href="index.html" class="topbar-logo">✦ BioLink</a>
      <div class="topbar-actions">
        ${BL.currentUser()?.username===username?'<a href="dashboard.html" class="top-btn">✏️ Edit</a>':''}
        <a href="credits.html" class="top-btn">ℹ Credits</a>
      </div>
    </div>

    <div class="share-bar">
      <span class="share-url" id="share-url">${esc(url)}</span>
      <button class="copy-btn" id="copy-url">Copy</button>
    </div>

    <div class="profile">
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <img class="avatar" src="${esc(bio.avatarUrl||`https://api.dicebear.com/9.x/bottts-neutral/svg?seed=${username}`)}" alt="${esc(username)}" onerror="this.src='https://api.dicebear.com/9.x/bottts-neutral/svg?seed=${username}'"/>
        <span class="status-dot" title="Online"></span>
      </div>
      <div class="username">${esc(bio.displayName||username)}</div>
      ${bio.pronouns?`<div class="pronouns">${esc(bio.pronouns)}</div>`:''}
      ${taglines.length?`<div class="typewriter-wrap"><span id="tw-text"></span><span class="cursor"></span></div>`:''}
      ${bio.bio?`<p class="bio-text">${esc(bio.bio)}</p>`:''}
      ${bio.location?`<div class="location">📍 ${esc(bio.location)}</div>`:''}
      ${bio.showViews!==false?`<div class="views-chip">👁 ${views.toLocaleString()} views</div>`:''}
      ${(bio.badges||[]).length?`<div class="user-badges">${bio.badges.map(b=>`<span class="user-badge">${esc(b)}</span>`).join('')}</div>`:''}
      ${Object.keys(socials).length?`<div class="socials">${Object.entries(socials).map(([k,v])=>{const s=socialUrl(k,v);return`<a href="${esc(s.href)}" target="_blank" rel="noopener" class="social-btn">${s.icon} ${s.label}</a>`;}).join('')}</div>`:''}
    </div>

    ${musicHTML}
    ${videoHTML}

    ${links.length?`<div class="sec-label">Links</div>${links.map(l=>`
      <a href="${esc(l.url)}" target="_blank" rel="noopener" class="link-card" data-url="${esc(l.url)}">
        <div class="link-icon">${esc(l.icon||guessEmoji(l.url))}</div>
        <div class="link-info">
          <div class="link-title">${esc(l.title)}</div>
          ${l.desc?`<div class="link-desc">${esc(l.desc)}</div>`:''}
        </div>
        ${l.tag?`<span class="link-tag">${esc(l.tag)}</span>`:''}
        <span class="link-arrow">↗</span>
      </a>`).join('')}`:''}

    ${galleryHTML}

    <div class="credit-footer">
      <a href="credits.html" class="credit-badge">✦ Powered by BioLink — Create yours free</a>
    </div>
  `;

  // copy
  document.getElementById('copy-url').addEventListener('click',function(){copyText(url,this);});

  // typewriter
  if(taglines.length){
    let ti=0,ci=0,del=false;
    const tw=document.getElementById('tw-text');
    const step=()=>{if(!tw)return;const t=taglines[ti];if(!del){tw.textContent=t.slice(0,++ci);if(ci===t.length){del=true;setTimeout(step,1800);return;}}else{tw.textContent=t.slice(0,--ci);if(ci===0){del=false;ti=(ti+1)%taglines.length;}}setTimeout(step,del?45:80);};
    step();
  }

  // audio player
  const audioEl=document.getElementById('audio-el');
  if(audioEl){
    const playBtn=document.getElementById('play-btn'),progWrap=document.getElementById('prog-wrap'),progBar=document.getElementById('prog-bar'),timeDisp=document.getElementById('time-display'),volSlider=document.getElementById('vol-slider');
    let playing=false;
    const fmt=s=>{const m=Math.floor(s/60),sc=Math.floor(s%60);return`${m}:${sc.toString().padStart(2,'0')}`;};
    playBtn.addEventListener('click',()=>{if(playing){audioEl.pause();playBtn.textContent='▶';playing=false;}else{audioEl.play();playBtn.textContent='⏸';playing=true;}});
    audioEl.addEventListener('timeupdate',()=>{if(audioEl.duration){progBar.style.width=(audioEl.currentTime/audioEl.duration*100)+'%';timeDisp.textContent=fmt(audioEl.currentTime)+' / '+fmt(audioEl.duration);}});
    audioEl.addEventListener('ended',()=>{playBtn.textContent='▶';playing=false;progBar.style.width='0%';});
    progWrap.addEventListener('click',e=>{const r=progWrap.getBoundingClientRect();audioEl.currentTime=(e.clientX-r.left)/r.width*audioEl.duration;});
    volSlider.addEventListener('input',()=>{audioEl.volume=parseFloat(volSlider.value);});
    if(music.autoplay){setTimeout(()=>{audioEl.play().then(()=>{playBtn.textContent='⏸';playing=true;}).catch(()=>{});},1000);}
  }

  // gallery lightbox
  document.querySelectorAll('.gallery-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const img=document.getElementById('lb-img');
      img.src=card.dataset.src;
      document.getElementById('lightbox').classList.add('open');
    });
  });

  // link click tracking
  document.querySelectorAll('.link-card').forEach(card=>{
    card.addEventListener('click',()=>BL.trackClick(username));
  });

  // QR
  document.getElementById('qr-fab').style.display='flex';
  let qrDrawn=false;
  document.getElementById('qr-fab').addEventListener('click',()=>{
    document.getElementById('qr-modal').classList.add('open');
    if(!qrDrawn){drawQR(document.getElementById('qrc'));qrDrawn=true;}
  });
  document.getElementById('qr-close').addEventListener('click',()=>document.getElementById('qr-modal').classList.remove('open'));
  document.getElementById('qr-modal').addEventListener('click',e=>{if(e.target===document.getElementById('qr-modal'))document.getElementById('qr-modal').classList.remove('open');});
}

// lightbox close
document.getElementById('lb-close').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('lightbox').classList.remove('open');document.getElementById('qr-modal').classList.remove('open');}});

// device time
function updateTime(){const n=new Date();const t=document.getElementById('device-time');if(t)t.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
updateTime();setInterval(updateTime,10000);

function showNotFound(title,sub){page.innerHTML=`<div class="not-found"><div class="nf-icon">🔮</div><h2>${esc(title)}</h2><p>${esc(sub)}</p><a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;margin-top:8px">← Create yours free</a></div>`;}

render();
</script>
</body>
</html>
