<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — BioLink Premium</title>
  <link rel="icon" type="image/svg+xml" href="/assets/avatar.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-logo {
      font-size: 18px; font-weight: 800;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 32px;
    }
    .sidebar-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--rad);
      font-size: 14px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: all var(--trans);
      border: none; background: none; width: 100%;
    }
    .sidebar-item:hover, .sidebar-item.active {
      background: var(--card);
      color: var(--text);
    }
    .sidebar-item.active { color: var(--accent); }
    .sidebar-badge {
      margin-left: auto;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 50px;
      background: var(--accent-dim);
      color: var(--accent);
    }
    .main-content { padding: 32px; max-width: 1100px; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .users-search {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .users-search input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rad);
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }
    .users-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .role-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rad-sm);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
    }
    .action-btn {
      width: 32px; height: 32px;
      border-radius: var(--rad-sm);
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; transition: all var(--trans);
    }
    .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .action-btn.danger:hover { background: var(--danger); border-color: var(--danger); }
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform var(--trans);
        width: 260px;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 99;
      }
      .sidebar-overlay.open { display: block; }
      .mobile-toggle {
        display: flex;
        position: fixed;
        top: 12px; left: 12px;
        z-index: 90;
        width: 40px; height: 40px;
        border-radius: var(--rad);
        background: var(--card);
        border: 1px solid var(--border);
        align-items: center; justify-content: center;
        color: var(--text);
        cursor: pointer;
      }
      .main-content { padding: 20px; padding-top: 60px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .settings-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="ambient-orb ambient-orb-1"></div>
  <div class="ambient-orb ambient-orb-2"></div>

  <div class="admin-layout z1">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#aGrad)" stroke-width="2.5">
          <defs><linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c6aff"/><stop offset="100%" stop-color="#ff6af0"/></linearGradient></defs>
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span>Admin</span>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-item active" onclick="switchTab('overview')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Overview
        </button>
        <button class="sidebar-item" onclick="switchTab('users')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Users
        </button>
        <button class="sidebar-item" onclick="switchTab('domains')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
          Domains
        </button>
        <button class="sidebar-item" onclick="switchTab('settings')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.67 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.67 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.67a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
      </nav>
      <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border);">
        <button class="sidebar-item" onclick="window.location.href='/dashboard'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Back to Dashboard
        </button>
        <button class="sidebar-item" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <main class="main-content">
      <!-- OVERVIEW -->
      <div class="tab-content active" id="tab-overview">
        <div class="section-header">
          <h2 class="text-gradient">Platform Overview</h2>
        </div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="stUsers">0</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stBios">0</div>
            <div class="stat-label">Published Bios</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stViews">0</div>
            <div class="stat-label">Total Views</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stClicks">0</div>
            <div class="stat-label">Total Clicks</div>
          </div>
        </div>
        <div class="card" style="margin-bottom: 20px;">
          <h3 style="margin-bottom: 16px;">Today</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <div style="font-size: 2.5rem; font-weight: 800; color: var(--accent);" id="stTodayViews">0</div>
              <div style="font-size: 13px; color: var(--muted);">Views today</div>
            </div>
            <div>
              <div style="font-size: 2.5rem; font-weight: 800; color: var(--accent-2);" id="stTodayClicks">0</div>
              <div style="font-size: 13px; color: var(--muted);">Clicks today</div>
            </div>
          </div>
        </div>
      </div>

      <!-- USERS -->
      <div class="tab-content" id="tab-users">
        <div class="section-header">
          <h2 class="text-gradient">Users</h2>
        </div>
        <div class="users-search">
          <input type="text" id="userSearch" placeholder="Search users..." oninput="filterUsers()">
        </div>
        <div class="card" style="padding: 0; overflow: hidden;">
          <table class="admin-table" id="usersTable">
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </div>

      <!-- DOMAINS -->
      <div class="tab-content" id="tab-domains">
        <div class="section-header">
          <h2 class="text-gradient">Custom Domains</h2>
        </div>
        <div class="card" id="domainsList">
          <p style="color: var(--muted); text-align: center;">Loading...</p>
        </div>
      </div>

      <!-- SETTINGS -->
      <div class="tab-content" id="tab-settings">
        <div class="section-header">
          <h2 class="text-gradient">Platform Settings</h2>
          <button class="btn btn-primary btn-sm" onclick="saveSettings()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Save
          </button>
        </div>
        <div class="card" style="margin-bottom: 20px;">
          <div class="settings-row">
            <div class="field">
              <label>Platform Name</label>
              <input type="text" id="setName" placeholder="BioLink">
            </div>
            <div class="field">
              <label>
                <input type="checkbox" id="setRegister" style="width: auto; margin-right: 8px;">
                Allow Registration
              </label>
            </div>
          </div>
          <div class="settings-row" style="margin-top: 16px;">
            <div class="field">
              <label>
                <input type="checkbox" id="setShowViews" style="width: auto; margin-right: 8px;">
                Show Views Globally
              </label>
            </div>
            <div class="field">
              <label>
                <input type="checkbox" id="setMaintenance" style="width: auto; margin-right: 8px;">
                Maintenance Mode
              </label>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    initParticles('particle-canvas', { count: 30, connect: true });
    loadAdmin();
  </script>
</body>
</html>
