<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#2a2a4e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6d3"/>
      <stop offset="100%" stop-color="#e8d5c0"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(124,106,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,106,240,0.2)"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(124,106,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(124,106,255,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#glowGrad)" stroke-width="2"/>
  <!-- Halo -->
  <circle cx="200" cy="200" r="160" fill="url(#halo)"/>
  <!-- Hair back -->
  <path d="M 80 180 Q 60 120 120 80 Q 180 50 240 70 Q 300 90 330 150 Q 350 200 340 260 Q 330 320 280 350 L 120 350 Q 70 320 60 260 Q 50 220 80 180" fill="url(#hairGrad)" stroke="rgba(124,106,255,0.3)" stroke-width="1"/>
  <!-- Neck -->
  <path d="M 160 280 Q 160 330 170 360 L 230 360 Q 240 330 240 280" fill="url(#skinGrad)"/>
  <!-- Shoulders/collar -->
  <path d="M 120 360 Q 200 350 280 360 L 300 400 L 100 400 Z" fill="#1a1a2e"/>
  <path d="M 120 360 Q 200 350 280 360" fill="none" stroke="rgba(124,106,255,0.5)" stroke-width="2"/>
  <!-- Face -->
  <ellipse cx="200" cy="200" rx="75" ry="90" fill="url(#skinGrad)"/>
  <!-- Hair front -->
  <path d="M 130 140 Q 150 90 200 80 Q 250 90 270 140 Q 280 170 270 200 L 265 220 Q 260 180 240 150 Q 200 130 160 150 Q 140 180 135 220 L 130 200 Q 120 170 130 140" fill="url(#hairGrad)" stroke="rgba(124,106,255,0.2)" stroke-width="1"/>
  <!-- Hair strands -->
  <path d="M 120 160 Q 100 180 110 240" fill="none" stroke="#2a2a4e" stroke-width="3" stroke-linecap="round"/>
  <path d="M 280 160 Q 300 180 290 240" fill="none" stroke="#2a2a4e" stroke-width="3" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="165" cy="195" rx="18" ry="14" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <ellipse cx="235" cy="195" rx="18" ry="14" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <!-- Eye highlights -->
  <circle cx="160" cy="190" r="4" fill="white" opacity="0.9"/>
  <circle cx="230" cy="190" r="4" fill="white" opacity="0.9"/>
  <circle cx="168" cy="198" r="2" fill="white" opacity="0.5"/>
  <circle cx="238" cy="198" r="2" fill="white" opacity="0.5"/>
  <!-- Eyelashes -->
  <path d="M 147 188 Q 165 175 183 188" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <path d="M 217 188 Q 235 175 253 188" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M 145 175 Q 165 165 185 175" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 215 175 Q 235 165 255 175" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 200 210 L 196 225 L 204 225" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M 185 245 Q 200 255 215 245" fill="none" stroke="rgba(200,80,100,0.6)" stroke-width="2" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="150" cy="230" rx="20" ry="12" fill="rgba(255,120,120,0.15)" filter="url(#glow)"/>
  <ellipse cx="250" cy="230" rx="20" ry="12" fill="rgba(255,120,120,0.15)" filter="url(#glow)"/>
  <!-- Cyber tech overlay -->
  <circle cx="125" cy="200" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="275" cy="200" r="8" fill="none" stroke="#ff6af0" stroke-width="1.5" opacity="0.7"/>
  <path d="M 125 192 L 125 208" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <path d="M 275 192 L 275 208" stroke="#ff6af0" stroke-width="1" opacity="0.5"/>
  <!-- Floating particles -->
  <circle cx="100" cy="120" r="2" fill="#7c6aff" opacity="0.6">
    <animate attributeName="cy" values="120;110;120" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="140" r="1.5" fill="#ff6af0" opacity="0.5">
    <animate attributeName="cy" values="140;130;140" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="320" r="2" fill="#00d4ff" opacity="0.4">
    <animate attributeName="cy" values="320;310;320" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Halo ring -->
  <ellipse cx="200" cy="80" rx="60" ry="8" fill="none" stroke="rgba(124,106,255,0.3)" stroke-width="1.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>