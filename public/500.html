<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Error — BioLink</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/svg+xml" href="/assets/avatar.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .error-card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--rad-lg);
      padding: 48px 36px;
      animation: scaleIn 0.4s ease-out;
    }
    .error-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 90, 90, 0.1);
      border: 2px solid rgba(255, 90, 90, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .error-code {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff5a5a, #ff9a5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="ambient-orb ambient-orb-1"></div>
  <div class="ambient-orb ambient-orb-2"></div>

  <div class="error-page z1">
    <div class="error-card">
      <div class="error-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ff5a5a" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="error-code">500</div>
      <div class="error-title">Something went wrong</div>
      <p class="error-desc">
        We ran into an unexpected error on our end. Our team has been notified. Please try again in a moment.
      </p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;width:100%;max-width:240px;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to Home
        </a>
        <button onclick="location.reload()" class="btn btn-ghost" style="width:100%;max-width:240px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Try Again
        </button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
